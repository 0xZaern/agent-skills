name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tools/devpulse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/devpulse/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build library + CLI
        run: npm run build

      - name: Typecheck
        run: npm run typecheck
