name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-devpulse:
    name: Build devpulse
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skills/devpulse

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: skills/devpulse/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build library + CLI
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

  build-codemap:
    name: Build codemap
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skills/codemap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: skills/codemap/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build library + CLI
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Smoke test
        run: node dist/cli.js --stats .

  build-apiscout:
    name: Build apiscout
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skills/apiscout

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: skills/apiscout/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build library + CLI
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

  build-auditsnap:
    name: Build auditsnap
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skills/auditsnap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: skills/auditsnap/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build library + CLI
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

  build-secretscan:
    name: Build secretscan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skills/secretscan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: skills/secretscan/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build library + CLI
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

  build-schemadiff:
    name: Build schemadiff
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skills/schemadiff

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: skills/schemadiff/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build library + CLI
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

  build-logfold:
    name: Build logfold
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skills/logfold

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: skills/logfold/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build library + CLI
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

  build-mcp:
    name: Build MCP server
    runs-on: ubuntu-latest
    needs: [build-devpulse, build-codemap, build-apiscout, build-auditsnap, build-secretscan, build-schemadiff, build-logfold]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build devpulse (dependency)
        working-directory: skills/devpulse
        run: npm ci && npm run build

      - name: Build codemap (dependency)
        working-directory: skills/codemap
        run: npm install && npm run build

      - name: Build apiscout (dependency)
        working-directory: skills/apiscout
        run: npm install && npm run build

      - name: Build auditsnap (dependency)
        working-directory: skills/auditsnap
        run: npm install && npm run build

      - name: Build secretscan (dependency)
        working-directory: skills/secretscan
        run: npm install && npm run build

      - name: Build schemadiff (dependency)
        working-directory: skills/schemadiff
        run: npm install && npm run build

      - name: Build logfold (dependency)
        working-directory: skills/logfold
        run: npm install && npm run build

      - name: Install MCP server dependencies
        working-directory: skills/mcp
        run: npm install

      - name: Build MCP server
        working-directory: skills/mcp
        run: npm run build

      - name: Typecheck MCP server
        working-directory: skills/mcp
        run: npm run typecheck
